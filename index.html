<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YesDay | RSVP Systém</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #f4f1ea; --gold: #d4af37; --dark: #1a1a1a; --white: #ffffff; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--cream); color: var(--dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; width: 90%; background: white; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 5px; margin: 20px; }
        h2 { font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 30px; color: var(--dark); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; font-family: 'Montserrat'; box-sizing: border-box; border-radius: 3px; }
        input:focus { border-color: var(--gold); outline: none; }
        #dynamic-section { background: #fafafa; border-left: 3px solid var(--gold); padding: 20px; margin-top: 10px; display: none; }
        .btn-send { background: var(--dark); color: white; width: 100%; padding: 15px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-send:hover { background: var(--gold); }
        #success-msg { display: none; text-align: center; color: #2ecc71; font-weight: 600; margin-top: 20px; padding: 15px; background: #e8f8f0; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="form-wrapper">
        <h2>Potvrdenie účasti</h2>
        <form id="rsvp-form">
            <div class="form-group">
                <label>Vaše meno a priezvisko</label>
                <input type="text" name="meno" required placeholder="napr. Ján Novák">
            </div>

            <div class="form-group">
                <label>Prídete?</label>
                <select name="ucast" id="ucast-select" onchange="toggleGuestFields()" required>
                    <option value="">Vyberte možnosť</option>
                    <option value="Ano">Áno, prídeme!</option>
                    <option value="Nie">Bohužiaľ, nemôžeme</option>
                </select>
            </div>

            <div id="dynamic-section">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Počet dospelých</label>
                        <input type="number" name="dospeli" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>Počet detí</label>
                        <input type="number" name="deti" value="0" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>Mená ostatných hostí</label>
                    <textarea name="ostatni_menovite" rows="2" placeholder="napr. Jana Nováková, Lucka (3r.)"></textarea>
                </div>

                <div class="form-group">
                    <label>Alergie / Diéty</label>
                    <textarea name="alergie" rows="2" placeholder="napr. 1x bez laktózy"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>Odkaz pre snúbencov</label>
                <textarea name="poznamka" rows="2"></textarea>
            </div>

            <button type="submit" class="btn-send" id="submit-btn">Odoslať odpoveď</button>
        </form>
    </div>
    <div id="success-msg">
        <p>Ďakujeme! ❤️</p>
        <p style="font-size: 0.9rem; font-weight: 400;">Vaša odpoveď bola úspešne odoslaná do našej svadobnej tabuľky.</p>
    </div>
</div>

<script>
   https://script.google.com/macros/s/AKfycbz-c0zQLqIS0Xmddph0JVob8t0YJMHvFhaeF8rb71SP3tLUf_oS_AdtD-23lvAfiS0Z/exec
    const scriptURL = 'SEM_VLOZ_SVOJ_LINK_Z_GOOGLE';
    
    const form = document.getElementById('rsvp-form');
    const dynamicSection = document.getElementById('dynamic-section');

    function toggleGuestFields() {
        const ucast = document.getElementById('ucast-select').value;
        dynamicSection.style.display = (ucast === 'Ano') ? 'block' : 'none';
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = 'Odosiela sa...';
        submitBtn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                document.getElementById('form-wrapper').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            })
            .catch(error => {
                console.error('Chyba!', error.message);
                alert('Chyba pri odosielaní. Skontrolujte pripojenie.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Odoslať odpoveď';
            });
    });
</script>

</body>
</html>
